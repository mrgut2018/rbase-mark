upstream rbase_api_backend {
    # 使用最少连接数负载均衡
    least_conn;
    
    # 后端服务器列表
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=30s;
    
    # 保持连接
    keepalive 32;
}

server {
    listen 80;
    server_name api.rbase.com;  # 替换为您的域名
    
    # 客户端最大请求体大小
    client_max_body_size 10M;
    
    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;  # 增加发送超时，适应 LLM 调用
    proxy_read_timeout 300s;  # 增加读取超时，适应 LLM 调用
    
    # 缓冲设置
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # 请求头设置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 健康检查
    location /health {
        proxy_pass http://rbase_api_backend;
        access_log off;
    }
    
    # API 路由
    location /api/ {
        proxy_pass http://rbase_api_backend;
        
        # 启用 gzip 压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
        
        # 缓存设置
        proxy_cache_valid 200 1m;
        proxy_cache_valid 404 1m;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    # 静态文件服务（如果有）
    location /static/ {
        alias /opt/rbase/deep-academic-research/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 错误页面
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # 日志配置
    access_log /var/log/nginx/rbase_api_access.log;
    error_log /var/log/nginx/rbase_api_error.log;
}

# HTTPS 配置（如果需要）
server {
    listen 443 ssl http2;
    server_name api.rbase.com;  # 替换为您的域名
    
    # SSL 证书配置
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    
    # SSL 安全设置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 其他配置与 HTTP 相同
    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    location /health {
        proxy_pass http://rbase_api_backend;
        access_log off;
    }
    
    location /api/ {
        proxy_pass http://rbase_api_backend;
        
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
        
        proxy_cache_valid 200 1m;
        proxy_cache_valid 404 1m;
        
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    location /static/ {
        alias /opt/rbase/deep-academic-research/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    access_log /var/log/nginx/rbase_api_access.log;
    error_log /var/log/nginx/rbase_api_error.log;
} 